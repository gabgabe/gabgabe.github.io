<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Dotraww</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: Arial;
      background-color: #111111;
    }
    
    .header {
      text-align: center;
      padding: 32px;
      color: white;
    }
    
    .row {
      display: -ms-flexbox; /* IE10 */
      display: flex;
      -ms-flex-wrap: wrap; /* IE10 */
      flex-wrap: wrap;
      padding: 0 4px;
    }
    
    /* Create four equal columns that sits next to each other */
    .column {
      -ms-flex: 25%; /* IE10 */
      flex: 25%;
      max-width: 25%;
      padding: 0 4px;
    }
    
    .column img {
      margin-top: 8px;
      vertical-align: middle;
      width: 100%;
    }
    
    /* Responsive layout - makes a two column-layout instead of four columns */
    @media screen and (max-width: 800px) {
      .column {
        -ms-flex: 50%;
        flex: 50%;
        max-width: 50%;
      }
    }
    
    /* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
    @media screen and (max-width: 600px) {
      .column {
        -ms-flex: 100%;
        flex: 100%;
        max-width: 100%;
      }
    }

    .icons {
        font-size: 36px;
        color: #ff0080;
    }

</style>
<body>
    <div class="header">
        <h1>dotraww</h1>
        <a href="https://instagram.com/dotraww" class="fa fa-instagram" style="font-size:36px;color:#ff0080;margin:5px;"></a>
        <a href="mailto:gabriele.ckm@gmail.com" class="fa fa-envelope" style="font-size:36px;color:#ff0080;margin:5px;"></a>
    </div>
    <div class="row"> 
        <div class="columnoooo">
          <img src="images/photo_1.jpg" style="width:100%">
          <img src="images/photo_2.jpg" style="width:100%">
          <img src="images/photo_3.jpg" style="width:100%">
          <img src="images/photo_4.jpg" style="width:100%">
        </div>
</body>
</html>
